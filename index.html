    ];

    const shishaProducts = [
        { name: "Tangiers Cane Mint", desc: "Legendary peppermint", price: 3500, oldPrice: 4500, discount: 22, img: "", rating: 4.9, fullDesc: "Dark leaf, pure peppermint. High nicotine.", specs: "250g | Dark Leaf" },
        { name: "Adalya Love 66", desc: "Passionfruit, watermelon, mint", price: 2800, oldPrice: 3600, discount: 22, img: "", rating: 4.7, fullDesc: "Tropical blend. Massive clouds.", specs: "250g | Blonde Leaf" },
        { name: "Al Fakher Grape Mint", desc: "Sweet grape + mint", price: 2200, oldPrice: 2800, discount: 21, img: "", rating: 4.5, fullDesc: "Classic grape mint. Smooth smoke.", specs: "250g | Blonde Leaf" },
        { name: "Starbuzz Blue Mist", desc: "Blueberry + mint", price: 3000, oldPrice: 3900, discount: 23, img: "", rating: 4.6, fullDesc: "Iconic blueberry mint. Huge clouds.", specs: "250g | Blonde Leaf" },
        { name: "Al Fakher Double Apple", desc: "Apple + anise", price: 2200, oldPrice: 2800, discount: 21, img: "", rating: 4.4, fullDesc: "Traditional apple anise. Classic flavor.", specs: "250g | Blonde Leaf" },
        { name: "MustHave Pinkman", desc: "Raspberry, grapefruit, cooling", price: 3800, oldPrice: 4900, discount: 22, img: "", rating: 4.8, fullDesc: "Complex fruit blend. Cooling finish.", specs: "250g | Dark Leaf" },
        { name: "Adalya Lady Killer", desc: "Mango, melon, berries, mint", price: 2800, oldPrice: 3600, discount: 22, img: "", rating: 4.6, fullDesc: "Tropical vacation in a bowl.", specs: "250g | Blonde Leaf" }
    ];

    let cart = JSON.parse(localStorage.getItem('vibes_cart') || '[]');
    let favorites = JSON.parse(localStorage.getItem('vibes_favorites') || '[]');
    let currentCategory = 'vape';
    let currentModalProduct = null;
    let searchQuery = '';

    function saveCart() { localStorage.setItem('vibes_cart', JSON.stringify(cart)); updateCartCount(); }
    function saveFavorites() { localStorage.setItem('vibes_favorites', JSON.stringify(favorites)); updateFavCount(); }
    function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((s,i)=> s + i.quantity, 0); }
    function updateFavCount() { document.getElementById('favCount').innerText = favorites.length; }

    function renderVeloDots(dots) {
        let html = '<div style="display:flex; gap:4px; margin:5px 0;">';
        for (let i = 0; i < dots; i++) html += '<div style="width:8px; height:8px; background:var(--primary); border-radius:50%;"></div>';
        html += '</div>';
        return html;
    }

    function renderSliderProduct(p) {
        const placeholderImg = 'https://placehold.co/400x400/1a1a2a/FF3300?text=' + encodeURIComponent(p.name.substring(0, 12));
        const dotsHtml = p.dots ? renderVeloDots(p.dots) : '';
        return `
            <div class="product-slide" onclick="openModal('${p.name.replace(/'/g, "\\'")}')">
                <img class="product-img-slide" src="${p.img || placeholderImg}" alt="${p.name}">
                <div class="product-info-slide">
                    <div class="product-name-slide">${p.name}</div>
                    ${dotsHtml}
                    <div><span class="product-old-price-slide">KES ${p.oldPrice}</span><span class="product-price-slide">KES ${p.price}</span></div>
                </div>
            </div>
        `;
    }

    function createCategorySection(category, products, title) {
        if (!products || products.length === 0) return '';
        const filtered = searchQuery ? products.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.desc.toLowerCase().includes(searchQuery.toLowerCase())) : products;
        if (filtered.length === 0) return '';
        
        let html = `<div class="category-header"><h2>${title}</h2><button class="view-all-btn" onclick="document.getElementById('${category}Slider').scrollLeft = 0; document.getElementById('${category}Slider').scrollBy({left: 1000, behavior: 'smooth'})">View All →</button></div>`;
        html += `<div class="slider-container">
            <div class="slider-nav slider-prev" onclick="slideHorizontal('${category}Slider', -1)">‹</div>
            <div class="slider-nav slider-next" onclick="slideHorizontal('${category}Slider', 1)">›</div>
            <div class="slider-track" id="${category}Slider">
                ${filtered.map(p => renderSliderProduct(p)).join('')}
                ${filtered.map(p => renderSliderProduct(p)).join('')}
            </div>
        </div>`;
        return html;
    }

    window.slideHorizontal = (sliderId, direction) => {
        const slider = document.getElementById(sliderId);
        if (slider) {
            const scrollAmount = 300;
            slider.scrollLeft += direction * scrollAmount;
            if (slider.scrollLeft <= 0 && direction === -1) slider.scrollLeft = slider.scrollWidth / 2;
            if (slider.scrollLeft + slider.clientWidth >= slider.scrollWidth && direction === 1) slider.scrollLeft = slider.scrollWidth / 2 - slider.clientWidth;
        }
    };

    function renderProducts() {
        const container = document.getElementById('productsContainer');
        let html = '';
        
        if (currentCategory === 'vape') {
            html += createCategorySection('vape', vapeProducts, '💨 VAPE');
        } else if (currentCategory === 'velo') {
            html += createCategorySection('velo', veloProducts, '🟤 VELO');
        } else {
            html += createCategorySection('shisha', shishaProducts, '🌙 SHISHA');
        }
        
        if (html === '') {
            html = `<div style="text-align:center; padding:60px;">🔍 No products found for "${searchQuery}"</div>`;
        }
        container.innerHTML = html;
    }

    function openModal(productName) {
        let product = null;
        [...vapeProducts, ...veloProducts, ...shishaProducts].forEach(p => { if (p.name === productName) product = p; });
        if (!product) return;
        currentModalProduct = product;
        document.getElementById('modalTitle').innerText = product.name;
        document.getElementById('modalImg').src = product.img || 'https://placehold.co/400x400/1a1a2a/FF3300?text=' + encodeURIComponent(product.name.substring(0, 15));
        document.getElementById('modalDesc').innerHTML = product.fullDesc || product.desc;
        document.getElementById('modalSpecs').innerHTML = `<strong>📋 Specs:</strong><br>${product.specs || 'Contact us'}`;
        document.getElementById('modalPrice').innerHTML = `<span style="text-decoration:line-through; color:#ff6666;">KES ${product.oldPrice}</span> <span style="font-size:1.3rem; font-weight:bold; color:var(--primary);">KES ${product.price}</span> <span style="background:#ff0055; padding:2px 6px; border-radius:20px; font-size:0.7rem;">-${product.discount}%</span>`;
        
        let starsHtml = '';
        for (let i = 1; i <= 5; i++) {
            starsHtml += `<span class="star ${i <= product.rating ? 'selected' : ''}" onclick="setRating('${product.name}', ${i})">★</span>`;
        }
        document.getElementById('starRating').innerHTML = starsHtml;
        document.getElementById('productModal').style.display = 'flex';
    }

    window.setRating = (productName, rating) => {
        let product = [...vapeProducts, ...veloProducts, ...shishaProducts].find(p => p.name === productName);
        if (product) {
            product.rating = rating;
            localStorage.setItem('vibes_ratings', JSON.stringify({[productName]: rating}));
            openModal(productName);
        }
    };

    document.getElementById('modalClose').onclick = () => document.getElementById('productModal').style.display = 'none';
    document.getElementById('modalAddToCart').onclick = () => {
        if (currentModalProduct) addToCart(currentModalProduct.name, currentModalProduct.price);
    };

    function addToCart(name, price) {
        const existing = cart.find(item => item.name === name);
        if (existing) existing.quantity++;
        else cart.push({ name, price, quantity: 1 });
        saveCart();
        updateCartUI();
        alert(`🎉 ${name} added to cart!`);
    }

    function toggleFavorite(name, price) {
        const existing = favorites.find(f => f.name === name);
        if (existing) favorites = favorites.filter(f => f.name !== name);
        else favorites.push({ name, price });
        saveFavorites();
        updateFavoritesUI();
        renderProducts();
    }

    function isFavorite(name) { return favorites.some(f => f.name === name); }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        if (!cart.length) {
            container.innerHTML = '<p>Cart is empty.</p>';
            document.getElementById('cartTotal').innerHTML = 'Total: KES 0';
            return;
        }
        let total = 0;
        container.innerHTML = cart.map((item, idx) => {
            total += item.price * item.quantity;
            return `<div class="panel-item">
                <div class="panel-item-info">
                    <div class="panel-item-name">${item.name}</div>
                    <div class="panel-item-price">KES ${item.price}</div>
                    <div style="display:flex; gap:6px; margin-top:4px;">
                        <button onclick="updateQuantity(${idx}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQuantity(${idx}, 1)">+</button>
                    </div>
                </div>
                <button onclick="removeFromCart(${idx})" style="background:none; border:none; color:#ff4444;">🗑️</button>
            </div>`;
        }).join('');
        document.getElementById('cartTotal').innerHTML = `Total: KES ${total}`;
        updateCartCount();
    }

    window.updateQuantity = (idx, delta) => {
        const item = cart[idx];
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart.splice(idx, 1);
            saveCart();
            updateCartUI();
        }
    };
    window.removeFromCart = (idx) => {
        cart.splice(idx, 1);
        saveCart();
        updateCartUI();
    };

    function updateFavoritesUI() {
        const container = document.getElementById('favoritesItems');
        if (!favorites.length) {
            container.innerHTML = '<p>No favorites yet.</p>';
            return;
        }
        container.innerHTML = favorites.map((item, idx) => `
            <div class="panel-item">
                <div class="panel-item-info">
                    <div class="panel-item-name">${item.name}</div>
                    <div class="panel-item-price">KES ${item.price}</div>
                </div>
                <button onclick="removeFavorite(${idx})" style="background:none; border:none; color:#ff4444;">🗑️</button>
            </div>
        `).join('');
        updateFavCount();
    }
    window.removeFavorite = (idx) => {
        favorites.splice(idx, 1);
        saveFavorites();
        updateFavoritesUI();
        renderProducts();
    };

    function generateWhatsAppMessage() {
        let msg = "Hello Vibes on Vibes, I want to order:\n";
        cart.forEach(item => msg += `- ${item.name} x${item.quantity} = KES ${item.price * item.quantity}\n`);
        msg += `\nTotal: KES ${cart.reduce((s,i)=> s + i.price * i.quantity,0)}\nDelivery: Ruiru\nThank you!`;
        return encodeURIComponent(msg);
    }

    document.getElementById('checkoutWA').onclick = () => {
        if (!cart.length) { alert('Cart is empty.'); return; }
        window.open(`https://wa.me/254714693283?text=${generateWhatsAppMessage()}`, '_blank');
    };

    function updateDeliveryMessage() {
        const now = new Date();
        const hour = now.getHours();
        if (hour < 22) document.getElementById('deliveryMsg').innerHTML = "🚚 ORDER BEFORE 10PM → NEXT DAY DELIVERY IN RUIRU";
        else document.getElementById('deliveryMsg').innerHTML = "🚚 ORDER RECEIVED → DELIVERY WITHIN 48 HOURS";
    }
    updateDeliveryMessage();

    document.getElementById('themeToggle').onclick = () => {
        document.body.classList.toggle('dark');
        document.getElementById('themeToggle').innerText = document.body.classList.contains('dark') ? '☀️' : '🌙';
    };

    function openCart() { document.getElementById('cartPanel').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeCart() { document.getElementById('cartPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
    function openFav() { document.getElementById('favoritesPanel').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeFav() { document.getElementById('favoritesPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

    document.getElementById('openCartBtn').onclick = openCart;
    document.getElementById('openFavoritesBtn').onclick = openFav;
    document.getElementById('floatCart').onclick = openCart;
    document.getElementById('floatFav').onclick = openFav;
    document.getElementById('closeCart').onclick = closeCart;
    document.getElementById('closeFavorites').onclick = closeFav;
    document.getElementById('overlay').onclick = () => { closeCart(); closeFav(); };

    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderProducts();
    });

    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.getAttribute('data-category');
            renderProducts();
        });
    });

    document.getElementById('confirmAge').onclick = () => {
        localStorage.setItem('vibes_age_verified', 'true');
        document.getElementById('ageGate').style.display = 'none';
    };
    document.getElementById('denyAge').onclick = () => {
        alert('Access denied. You must be 18+ to enter.');
        window.location.href = 'https://www.google.com';
    };
    if (localStorage.getItem('vibes_age_verified') === 'true') document.getElementById('ageGate').style.display = 'none';

    const savedRatings = JSON.parse(localStorage.getItem('vibes_ratings') || '{}');
    [...vapeProducts, ...veloProducts, ...shishaProducts].forEach(p => { if (savedRatings[p.name]) p.rating = savedRatings[p.name]; });

    renderProducts();
    updateCartUI();
    updateFavoritesUI();
    updateCartCount();
    updateFavCount();
</script>
</body>
</html>
