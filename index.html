<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Vapers City | Premium Shisha Flavors</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Russo+One&family=Orbitron:wght@400;700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --gold: #FFD700;
        --gold2: #FFA500;
        --dark: #050505;
        --header-h: 70px;
    }

    body {
        font-family: 'Montserrat', sans-serif;
        background: #0a0a0a;
        color: #f0f0f0;
        overflow-x: hidden;
    }

    /* ── SLIDING SMOKY VIDEO BACKGROUND ── */
    .smoky-bg-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        overflow: hidden;
    }
    .smoky-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        animation: smokyKenBurns 24s infinite;
        filter: brightness(0.45) contrast(1.2) saturate(1.3);
    }
    .smoky-bg:nth-child(1) { animation-delay: 0s; }
    .smoky-bg:nth-child(2) { animation-delay: 8s; }
    .smoky-bg:nth-child(3) { animation-delay: 16s; }
    @keyframes smokyKenBurns {
        0% { opacity: 0; transform: scale(1) translate(0, 0); }
        4% { opacity: 1; }
        29% { opacity: 1; }
        33% { opacity: 0; transform: scale(1.08) translate(2%, 1%); }
        100% { opacity: 0; transform: scale(1.08) translate(2%, 1%); }
    }
    .smoky-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
        z-index: -1;
    }

    /* ── SITE HEADER ── */
    .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--header-h);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 100%);
        border-bottom: 1px solid rgba(255,215,0,0.25);
        backdrop-filter: blur(12px);
    }
    .header-chain {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: repeating-linear-gradient(90deg, #FFD700 0px, #FFA500 4px, #fff8dc 8px, #FFD700 12px, #b8860b 16px, #FFD700 20px);
        box-shadow: 0 0 8px rgba(255,215,0,0.5);
    }
    .header-logo {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.8rem;
        letter-spacing: 4px;
        background: linear-gradient(135deg, #FFD700 0%, #fff 30%, #FFA500 55%, #FFD700 80%, #fff 95%, #FFD700 100%);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: goldShimmer 3s ease infinite;
        cursor: pointer;
    }
    @keyframes goldShimmer {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .header-info {
        font-family: 'Orbitron', monospace;
        font-size: 0.5rem;
        letter-spacing: 2px;
        color: rgba(255,215,0,0.65);
        text-align: right;
        line-height: 1.6;
    }

    /* ── CATEGORY TOGGLE ── */
    .category-toggle {
        position: fixed;
        top: var(--header-h);
        left: 0;
        right: 0;
        z-index: 150;
        display: flex;
        justify-content: center;
        gap: 1rem;
        padding: 1rem;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,215,0,0.2);
    }
    .toggle-btn {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.2rem;
        padding: 0.5rem 1.5rem;
        border: 1px solid rgba(255,215,0,0.4);
        background: transparent;
        color: #fff;
        border-radius: 40px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .toggle-btn.active {
        background: linear-gradient(135deg, #FFD700, #FFA500);
        color: #000;
        border-color: transparent;
        box-shadow: 0 0 15px rgba(255,165,0,0.5);
    }

    /* ── MAIN CONTENT ── */
    .main-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 120px 1rem 4rem;
        position: relative;
        z-index: 2;
    }

    /* Product Grid */
    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
        margin-top: 2rem;
    }
    .product-card {
        background: rgba(20, 20, 30, 0.55);
        backdrop-filter: blur(12px);
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        border-color: rgba(255,215,0,0.3);
    }
    .product-img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        background: #1a1a2a;
    }
    .product-img.placeholder {
        background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255,215,0,0.3);
        font-size: 0.8rem;
    }
    .product-info {
        padding: 1rem;
    }
    .product-name {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.4rem;
        letter-spacing: 1px;
        color: #FFD700;
        margin-bottom: 0.3rem;
    }
    .product-desc {
        font-size: 0.75rem;
        color: rgba(255,255,255,0.7);
        margin-bottom: 0.8rem;
        line-height: 1.4;
        max-height: 60px;
        overflow-y: auto;
    }
    .product-price {
        font-size: 1.2rem;
        font-weight: bold;
        color: #FFA500;
        margin-bottom: 0.5rem;
    }
    .action-buttons {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }
    .btn-wishlist, .btn-cart {
        flex: 1;
        padding: 0.5rem;
        border: none;
        border-radius: 2rem;
        font-family: 'Montserrat', sans-serif;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
    }
    .btn-wishlist {
        background: rgba(255,255,255,0.1);
        color: #fff;
    }
    .btn-wishlist.active {
        background: #ff0055;
        color: #fff;
    }
    .btn-cart {
        background: linear-gradient(135deg, #25D366, #128C7E);
        color: #fff;
    }
    .btn-cart:hover {
        transform: scale(0.98);
        filter: brightness(1.1);
    }

    /* Sidebar Panels */
    .side-panel {
        position: fixed;
        top: 0;
        right: -400px;
        width: 380px;
        height: 100%;
        background: linear-gradient(135deg, #0a0a0a, #111);
        border-left: 1px solid rgba(255,215,0,0.3);
        z-index: 1000;
        padding: 2rem 1.5rem;
        transition: right 0.3s cubic-bezier(.77,0,.175,1);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    .side-panel.open {
        right: 0;
    }
    .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,215,0,0.2);
        padding-bottom: 1rem;
        font-family: 'Bebas Neue', cursive;
        font-size: 1.5rem;
    }
    .panel-close {
        background: none;
        border: none;
        color: #fff;
        font-size: 1.5rem;
        cursor: pointer;
    }
    .panel-item {
        display: flex;
        gap: 1rem;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding: 0.8rem 0;
    }
    .panel-item-img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 0.5rem;
    }
    .panel-item-info {
        flex: 1;
    }
    .panel-item-name {
        font-weight: bold;
    }
    .panel-item-price {
        color: #FFD700;
        font-size: 0.9rem;
    }
    .panel-item-remove {
        background: none;
        border: none;
        color: #ff4444;
        cursor: pointer;
    }
    .panel-total {
        margin-top: 1rem;
        text-align: right;
        font-weight: bold;
        font-size: 1.2rem;
    }
    .panel-wa-btn {
        background: linear-gradient(135deg, #25D366, #128C7E);
        border: none;
        padding: 0.8rem;
        border-radius: 2rem;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        margin-top: 1rem;
    }

    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
    }
    .overlay.show {
        opacity: 1;
        pointer-events: all;
    }

    /* Age Gate */
    .age-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.98);
        backdrop-filter: blur(20px);
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .age-card {
        background: rgba(0,0,0,0.9);
        border-radius: 2rem;
        padding: 2rem;
        max-width: 320px;
        text-align: center;
        border: 1px solid #FFD700;
    }
    .age-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 1.8rem;
    }
    .btn-yes {
        background: #25D366;
        padding: 0.7rem 1.4rem;
        border: none;
        border-radius: 3rem;
        font-weight: bold;
        cursor: pointer;
    }
    .btn-no {
        background: #444;
        padding: 0.7rem 1.4rem;
        border: none;
        border-radius: 3rem;
        font-weight: bold;
        color: white;
        cursor: pointer;
    }

    footer {
        text-align: center;
        font-size: 0.7rem;
        padding: 2rem;
        opacity: 0.6;
    }

    @media (max-width: 768px) {
        .side-panel { width: 90%; right: -90%; }
        .toggle-btn { font-size: 0.9rem; padding: 0.3rem 1rem; }
        .products-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    }
</style>
</head>
<body>

<div class="smoky-bg-container">
    <video class="smoky-bg" autoplay loop muted playsinline>
        <source src="https://cdn.pixabay.com/video/2021/11/02/95092-643266719_large.mp4" type="video/mp4">
    </video>
    <video class="smoky-bg" autoplay loop muted playsinline>
        <source src="https://cdn.pixabay.com/video/2020/10/10/51663-471017590_large.mp4" type="video/mp4">
    </video>
    <video class="smoky-bg" autoplay loop muted playsinline>
        <source src="https://cdn.pixabay.com/video/2021/10/16/93612-636581873_large.mp4" type="video/mp4">
    </video>
</div>
<div class="smoky-overlay"></div>

<!-- Age Gate -->
<div id="ageGate" class="age-modal">
    <div class="age-card">
        <h2 style="color:#FFD700;">🔞 AGE VERIFICATION</h2>
        <p>You must be 18+ to enter.<br>Nicotine products are for adults only.</p>
        <div class="age-buttons">
            <button class="btn-yes" id="confirmAge">✓ I AM 18+</button>
            <button class="btn-no" id="denyAge">✗ UNDER 18</button>
        </div>
    </div>
</div>

<header class="site-header">
    <div class="header-logo">💨 VAPERS CITY</div>
    <div class="header-info">📍 RUIRU · NAIROBI · THIKA<br>0714 693 283</div>
    <div class="header-chain"></div>
</header>

<!-- Category Toggle -->
<div class="category-toggle">
    <button class="toggle-btn active" data-category="vape">💨 VAPE</button>
    <button class="toggle-btn" data-category="velo">🟤 VELO</button>
    <button class="toggle-btn" data-category="shisha">🌙 SHISHA</button>
</div>

<div class="main-container">
    <div id="productsContainer" class="products-grid"></div>
</div>

<!-- Cart Sidebar -->
<div class="overlay" id="overlay"></div>
<div class="side-panel" id="cartPanel">
    <div class="panel-header">
        <span>🛒 YOUR CART</span>
        <button class="panel-close" id="closeCart">✕</button>
    </div>
    <div id="cartItems"></div>
    <div class="panel-total" id="cartTotal">Total: KES 0</div>
    <button class="panel-wa-btn" id="checkoutWA">📲 ORDER ON WHATSAPP</button>
</div>

<!-- Favorites Sidebar -->
<div class="side-panel" id="favoritesPanel">
    <div class="panel-header">
        <span>❤️ FAVORITES</span>
        <button class="panel-close" id="closeFavorites">✕</button>
    </div>
    <div id="favoritesItems"></div>
</div>

<!-- Floating Buttons -->
<div style="position: fixed; bottom: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px;">
    <button id="openCartBtn" style="background: #25D366; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">🛒</button>
    <button id="openFavoritesBtn" style="background: #ff0055; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">❤️</button>
</div>

<footer>
    © Vapers City Ruiru · Nicotine products for adults 18+ only · WhatsApp 0714693283
</footer>

<script>
    // ==================== PRODUCT DATA ====================
    // All "hookah" references removed, using "Shisha" instead.
    
    const productsData = {
        vape: [
            { name: "Geek Bar Pulse X", desc: "Mexico Mango Ice, 15,000 puffs", price: 2500, img: "images/geekbar.jpg", category: "vape" },
            { name: "Elf Bar Ultra 9000", desc: "Blue Razz Lemonade, 9,000 puffs", price: 2200, img: "images/elfbar.jpg", category: "vape" },
            { name: "Vozol Star 9000", desc: "Strawberry Watermelon, 9,000 puffs", price: 2600, img: "images/vozol.jpg", category: "vape" },
            { name: "HQD Cuvie Plus", desc: "Mango Ice, 1,200 puffs", price: 1300, img: "images/hqd.jpg", category: "vape" },
        ],
        velo: [
            { name: "Velo 3 Dots", desc: "Nicotine pouches, mild strength", price: 1200, img: "images/velo-3.jpg", category: "velo" },
            { name: "Velo 4 Dots", desc: "Nicotine pouches, medium strength", price: 1300, img: "images/velo-4.jpg", category: "velo" },
            { name: "Velo 5 Dots", desc: "Nicotine pouches, strong", price: 1400, img: "images/velo-5.jpg", category: "velo" },
            { name: "Velo 6 Dots", desc: "Nicotine pouches, extra strong", price: 1500, img: "images/velo-6.jpg", category: "velo" },
        ],
        shisha: [
            { name: "Tangiers Cane Mint", desc: "Legendary dark-leaf, intense peppermint", price: 3500, img: "images/tangiers-cane-mint.jpg", category: "shisha" },
            { name: "Adalya Love 66", desc: "Passionfruit, watermelon, mint", price: 2800, img: "images/adalya-love66.jpg", category: "shisha" },
            { name: "Al Fakher Grape Mint", desc: "Sweet grape + refreshing mint", price: 2200, img: "images/af-grape-mint.jpg", category: "shisha" },
            { name: "Starbuzz Blue Mist", desc: "Blueberry + subtle mint", price: 3000, img: "images/starbuzz-blue-mist.jpg", category: "shisha" },
            { name: "Al Fakher Double Apple", desc: "Apple + anise (licorice)", price: 2200, img: "images/af-double-apple.jpg", category: "shisha" },
            { name: "MustHave Pinkman", desc: "Raspberry/strawberry + grapefruit, cooling", price: 3800, img: "images/musthave-pinkman.jpg", category: "shisha" },
            { name: "Adalya Lady Killer", desc: "Mango, melon, wild berries, mint", price: 2800, img: "images/adalya-lady-killer.jpg", category: "shisha" },
            { name: "Trifecta Peppermint Shake", desc: "Peppermint + vanilla shake", price: 3500, img: "images/trifecta-peppermint.jpg", category: "shisha" },
            { name: "Darkside Mango Lassi", desc: "Mango, yogurt, cream", price: 3600, img: "images/darkside-mango-lassi.jpg", category: "shisha" },
            { name: "Fumari Lemon Mint", desc: "Zesty lemon + peppermint", price: 2500, img: "images/fumari-lemon-mint.jpg", category: "shisha" },
        ]
    };

    // ==================== STORAGE KEYS ====================
    let cart = JSON.parse(localStorage.getItem('vapers_cart') || '[]');
    let favorites = JSON.parse(localStorage.getItem('vapers_favorites') || '[]');
    let currentCategory = 'vape';

    function saveCart() { localStorage.setItem('vapers_cart', JSON.stringify(cart)); }
    function saveFavorites() { localStorage.setItem('vapers_favorites', JSON.stringify(favorites)); }

    function addToCart(product) {
        const existing = cart.find(item => item.name === product.name);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        saveCart();
        updateCartUI();
        alert(`${product.name} added to cart!`);
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        saveCart();
        updateCartUI();
    }

    function updateQuantity(index, delta) {
        const item = cart[index];
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart.splice(index, 1);
            saveCart();
            updateCartUI();
        }
    }

    function toggleFavorite(product) {
        const exists = favorites.some(f => f.name === product.name);
        if (exists) {
            favorites = favorites.filter(f => f.name !== product.name);
        } else {
            favorites.push(product);
        }
        saveFavorites();
        updateFavoritesUI();
        renderProducts();
    }

    function isFavorite(productName) {
        return favorites.some(f => f.name === productName);
    }

    function renderProducts() {
        const container = document.getElementById('productsContainer');
        const products = productsData[currentCategory];
        if (!products) return;

        container.innerHTML = products.map(p => `
            <div class="product-card">
                <img class="product-img" src="${p.img}" alt="${p.name}" onerror="this.src='https://placehold.co/400x400/1a1a2a/gold?text=No+Image'; this.classList.add('placeholder')">
                <div class="product-info">
                    <div class="product-name">${p.name}</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="product-price">KES ${p.price.toLocaleString()}</div>
                    <div class="action-buttons">
                        <button class="btn-wishlist ${isFavorite(p.name) ? 'active' : ''}" onclick="toggleFavoriteFromRender('${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.desc.replace(/'/g, "\\'")}', '${p.img.replace(/'/g, "\\'")}')">
                            ❤️ ${isFavorite(p.name) ? 'Saved' : 'Save'}
                        </button>
                        <button class="btn-cart" onclick="addToCartFromRender('${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.desc.replace(/'/g, "\\'")}', '${p.img.replace(/'/g, "\\'")}')">
                            🛒 Add to Cart
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    window.toggleFavoriteFromRender = (name, price, desc, img) => {
        toggleFavorite({ name, price, desc, img, category: currentCategory });
    };
    window.addToCartFromRender = (name, price, desc, img) => {
        addToCart({ name, price, desc, img, category: currentCategory });
    };

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        if (!container) return;
        if (cart.length === 0) {
            container.innerHTML = '<p>Your cart is empty.</p>';
            document.getElementById('cartTotal').innerHTML = 'Total: KES 0';
            return;
        }
        let total = 0;
        container.innerHTML = cart.map((item, idx) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            return `
                <div class="panel-item">
                    <img class="panel-item-img" src="${item.img}" onerror="this.src='https://placehold.co/60x60/1a1a2a/gold?text=No+Img'">
                    <div class="panel-item-info">
                        <div class="panel-item-name">${item.name}</div>
                        <div class="panel-item-price">KES ${item.price.toLocaleString()}</div>
                        <div style="display: flex; gap: 8px; margin-top: 5px;">
                            <button onclick="updateQuantity(${idx}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity(${idx}, 1)">+</button>
                        </div>
                    </div>
                    <button class="panel-item-remove" onclick="removeFromCart(${idx})">🗑️</button>
                </div>
            `;
        }).join('');
        document.getElementById('cartTotal').innerHTML = `Total: KES ${total.toLocaleString()}`;
    }

    function updateFavoritesUI() {
        const container = document.getElementById('favoritesItems');
        if (!container) return;
        if (favorites.length === 0) {
            container.innerHTML = '<p>No favorites yet.</p>';
            return;
        }
        container.innerHTML = favorites.map((item, idx) => `
            <div class="panel-item">
                <img class="panel-item-img" src="${item.img}" onerror="this.src='https://placehold.co/60x60/1a1a2a/gold?text=No+Img'">
                <div class="panel-item-info">
                    <div class="panel-item-name">${item.name}</div>
                    <div class="panel-item-price">KES ${item.price.toLocaleString()}</div>
                </div>
                <button class="panel-item-remove" onclick="removeFavorite(${idx})">🗑️</button>
            </div>
        `).join('');
    }

    window.removeFavorite = (idx) => {
        favorites.splice(idx, 1);
        saveFavorites();
        updateFavoritesUI();
        renderProducts();
    };

    function generateWhatsAppMessage() {
        let message = "Hello Vapers City, I want to order:\n";
        cart.forEach(item => {
            message += `- ${item.name} x${item.quantity} = KES ${(item.price * item.quantity).toLocaleString()}\n`;
        });
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        message += `\nTotal: KES ${total.toLocaleString()}\nDelivery Location: Ruiru\n\nThank you!`;
        return encodeURIComponent(message);
    }

    document.getElementById('checkoutWA')?.addEventListener('click', () => {
        if (cart.length === 0) {
            alert('Your cart is empty.');
            return;
        }
        const phone = "254714693283";
        window.open(`https://wa.me/${phone}?text=${generateWhatsAppMessage()}`, '_blank');
    });

    function openCart() { document.getElementById('cartPanel').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeCart() { document.getElementById('cartPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
    function openFavorites() { document.getElementById('favoritesPanel').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeFavorites() { document.getElementById('favoritesPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

    document.getElementById('openCartBtn')?.addEventListener('click', openCart);
    document.getElementById('openFavoritesBtn')?.addEventListener('click', openFavorites);
    document.getElementById('closeCart')?.addEventListener('click', closeCart);
    document.getElementById('closeFavorites')?.addEventListener('click', closeFavorites);
    document.getElementById('overlay')?.addEventListener('click', () => { closeCart(); closeFavorites(); });

    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.getAttribute('data-category');
            renderProducts();
        });
    });

    document.getElementById('confirmAge')?.addEventListener('click', () => {
        localStorage.setItem('vapersAgeVerified', 'true');
        document.getElementById('ageGate').style.display = 'none';
    });
    document.getElementById('denyAge')?.addEventListener('click', () => {
        alert('Access denied. You must be 18+ to enter.');
        window.location.href = 'https://www.google.com';
    });
    if (localStorage.getItem('vapersAgeVerified') === 'true') {
        document.getElementById('ageGate').style.display = 'none';
    }

    renderProducts();
    updateCartUI();
    updateFavoritesUI();
</script>
</body>
</html>
