        --dark: #050505;

    }

    body {

        background: #0a0a0a;
        color: #f0f0f0;
        overflow-x: hidden;
    }

    /* ── CATEGORY-SPECIFIC SMOKY BACKGROUNDS ── */
    .bg-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        overflow: hidden;
    }
    .bg-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.8s ease;
        filter: brightness(0.45) contrast(1.2) saturate(1.3);
    }
    .bg-video.active {
        opacity: 1;
    }
    .bg-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
        z-index: -1;
    }

    /* ── SITE HEADER (Centered Logo) ── */
    .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--header-h);
        z-index: 200;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 100%);
        border-bottom: 1px solid rgba(255,215,0,0.25);
        backdrop-filter: blur(12px);
    }
    .header-chain {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: repeating-linear-gradient(90deg, #FFD700 0px, #FFA500 4px, #fff8dc 8px, #FFD700 12px, #b8860b 16px, #FFD700 20px);
        box-shadow: 0 0 12px rgba(255,215,0,0.6);
    }
    .header-logo {
        font-family: 'Bebas Neue', cursive;
        font-size: 3rem;
        letter-spacing: 6px;
        background: linear-gradient(135deg, #FFD700 0%, #fff 30%, #FFA500 55%, #FFD700 80%, #fff 95%, #FFD700 100%);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: goldShimmer 3s ease infinite;
        cursor: pointer;
        text-align: center;
    }
    @keyframes goldShimmer {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .header-tagline {
        font-family: 'Orbitron', monospace;
        font-size: 0.65rem;
        letter-spacing: 4px;
        color: rgba(255,215,0,0.7);
        margin-top: 5px;
    }

    /* ── CATEGORY TOGGLE ── */
    .category-toggle {
        position: fixed;
        top: var(--header-h);
        left: 0;
        right: 0;
        z-index: 150;
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        padding: 1rem;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,215,0,0.2);
    }
    .toggle-btn {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.3rem;
        padding: 0.5rem 2rem;
        border: 1px solid rgba(255,215,0,0.4);
        background: transparent;
        color: #fff;
        border-radius: 40px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .toggle-btn.active {
        background: linear-gradient(135deg, #FFD700, #FFA500);
        color: #000;
        border-color: transparent;
        box-shadow: 0 0 20px rgba(255,165,0,0.6);
    }

    /* ── CONTACT BAR ── */
    .contact-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 150;
        display: flex;
        justify-content: center;
        gap: 2rem;
        padding: 0.8rem;
        background: rgba(0,0,0,0.9);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255,215,0,0.3);
        font-family: 'Orbitron', monospace;
        font-size: 0.8rem;
    }
    .contact-bar a {
        color: #FFD700;
        text-decoration: none;
    }
    .contact-bar a:hover {
        color: #fff;
    }

    /* ── MAIN CONTENT ── */

        font-size: 2rem;
        margin: 2rem 0 1rem;

    }

        gap: 1.5rem;
        margin-top: 1rem;
    }
    .product-card {
        background: rgba(20, 20, 30, 0.55);
        backdrop-filter: blur(12px);
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-card:hover {

        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        border-color: rgba(255,215,0,0.3);
    }
    .product-img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        background: #1a1a2a;
    }
    .product-img.placeholder {
        background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255,215,0,0.3);
        font-size: 0.8rem;
    }
    .product-info {
        padding: 1rem;
    }
    .product-name {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.4rem;
        letter-spacing: 1px;
        color: #FFD700;
        margin-bottom: 0.3rem;
    }
    .product-desc {
        font-size: 0.75rem;
        color: rgba(255,255,255,0.7);
        margin-bottom: 0.8rem;
        line-height: 1.4;
    }
    .product-price {
        font-size: 1.2rem;
        font-weight: bold;
        color: #FFA500;
        margin-bottom: 0.5rem;
    }

        margin: 5px 0;
    }

        height: 12px;
        background: #FFD700;
        border-radius: 50%;
    }
    .action-buttons {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }
    .btn-wishlist, .btn-cart {

        border: none;
        border-radius: 2rem;

            { name: "Musthave Rocketman", desc: "Strawberry, mango, creamy vanilla", price: 3700, img: "", category: "shisha" },
            { name: "Fumari Orange Gummi Bear", desc: "Candy-like orange, vanilla, cream", price: 2600, img: "", category: "shisha" },
            { name: "Fumari Pink Gummi Bear", desc: "Raspberry/strawberry, citrus", price: 2600, img: "", category: "shisha" },
            { name: "Trifecta Pineapple Guava", desc: "Pineapple + tart guava", price: 3300, img: "", category: "shisha" },
            { name: "Adalya Ice Lime on the rocks", desc: "Sharp lime + intense menthol", price: 2700, img: "", category: "shisha" },
            { name: "Starline French Puff", desc: "Vanilla cream puff, buttery", price: 3000, img: "", category: "shisha" },
            { name: "Azure Ice Pea", desc: "Sweet pear with cooling effect", price: 2900, img: "", category: "shisha" },
            { name: "Al Fakher Harvest Moon", desc: "Green tea, lemon, lime", price: 2400, img: "", category: "shisha" },
            { name: "Tangiers Foreplay on Peach", desc: "Peach, mango, passionfruit", price: 3600, img: "", category: "shisha" },
            { name: "Tangiers Orange Soda", desc: "Fizzy orange soda flavor", price: 3500, img: "", category: "shisha" }
        ]
    };

    // Helper to render Velo dots
    function renderVeloDots(dots) {
        if (!dots) return '';
        let html = '<div class="velo-dots">';
        for (let i = 0; i < dots; i++) {
            html += '<div class="velo-dot"></div>';
        }
        html += '</div>';
        return html;
    }

    // ==================== STORAGE & STATE ====================
    let cart = JSON.parse(localStorage.getItem('vapers_cart') || '[]');
    let favorites = JSON.parse(localStorage.getItem('vapers_favorites') || '[]');
    let currentCategory = 'vape';

    function saveCart() { localStorage.setItem('vapers_cart', JSON.stringify(cart)); }
    function saveFavorites() { localStorage.setItem('vapers_favorites', JSON.stringify(favorites)); }

    // Background switcher
    function switchBackground(category) {
        document.getElementById('bgVape').classList.remove('active');
        document.getElementById('bgVelo').classList.remove('active');
        document.getElementById('bgShisha').classList.remove('active');
        if (category === 'vape') document.getElementById('bgVape').classList.add('active');
        if (category === 'velo') document.getElementById('bgVelo').classList.add('active');
        if (category === 'shisha') document.getElementById('bgShisha').classList.add('active');
    }

    function addToCart(product) {
        const existing = cart.find(item => item.name === product.name);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        saveCart();
        updateCartUI();
        alert(`${product.name} added to cart!`);
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        saveCart();
        updateCartUI();
    }

    function updateQuantity(index, delta) {
        const item = cart[index];
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart.splice(index, 1);
            saveCart();
            updateCartUI();
        }
    }

    function toggleFavorite(product) {
        const exists = favorites.some(f => f.name === product.name);
        if (exists) {
            favorites = favorites.filter(f => f.name !== product.name);
        } else {
            favorites.push(product);
        }
        saveFavorites();
        updateFavoritesUI();
        renderProducts();
    }

    function isFavorite(productName) {
        return favorites.some(f => f.name === productName);
    }

    function renderProducts() {
        const container = document.getElementById('productsContainer');
        const products = productsData[currentCategory];
        if (!products) return;

        const placeholderImg = 'https://placehold.co/400x400/1a1a2a/gold?text=No+Image';

        container.innerHTML = products.map(p => {
            const dotsHtml = p.dots ? renderVeloDots(p.dots) : '';
            return `
                <div class="product-card">
                    <img class="product-img" src="${p.img || placeholderImg}" alt="${p.name}" onerror="this.src='${placeholderImg}'; this.classList.add('placeholder')">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        ${dotsHtml}
                        <div class="product-desc">${p.desc}</div>
                        <div class="product-price">KES ${p.price.toLocaleString()}</div>
                        <div class="action-buttons">
                            <button class="btn-wishlist ${isFavorite(p.name) ? 'active' : ''}" onclick="toggleFavoriteFromRender('${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.desc.replace(/'/g, "\\'")}', '${(p.img || '').replace(/'/g, "\\'")}', ${p.dots || 0})">
                                ❤️ ${isFavorite(p.name) ? 'Saved' : 'Save'}
                            </button>
                            <button class="btn-cart" onclick="addToCartFromRender('${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.desc.replace(/'/g, "\\'")}', '${(p.img || '').replace(/'/g, "\\'")}', ${p.dots || 0})">
                                🛒 Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.toggleFavoriteFromRender = (name, price, desc, img, dots) => {
        toggleFavorite({ name, price, desc, img, dots, category: currentCategory });
    };
    window.addToCartFromRender = (name, price, desc, img, dots) => {
        addToCart({ name, price, desc, img, dots, category: currentCategory });
    };

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        if (!container) return;
        if (cart.length === 0) {
            container.innerHTML = '<p>Your cart is empty.</p>';
            document.getElementById('cartTotal').innerHTML = 'Total: KES 0';
            return;
        }
        let total = 0;
        container.innerHTML = cart.map((item, idx) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            return `
                <div class="panel-item">
                    <img class="panel-item-img" src="${item.img || 'https://placehold.co/60x60/1a1a2a/gold?text=No+Img'}" onerror="this.src='https://placehold.co/60x60/1a1a2a/gold?text=No+Img'">
                    <div class="panel-item-info">
                        <div class="panel-item-name">${item.name}</div>
                        <div class="panel-item-price">KES ${item.price.toLocaleString()}</div>
                        <div style="display: flex; gap: 8px; margin-top: 5px;">
                            <button onclick="updateQuantity(${idx}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity(${idx}, 1)">+</button>
                        </div>
                    </div>
                    <button class="panel-item-remove" onclick="removeFromCart(${idx})">🗑️</button>
                </div>
            `;
        }).join('');
        document.getElementById('cartTotal').innerHTML = `Total: KES ${total.toLocaleString()}`;
    }

    function updateFavoritesUI() {
        const container = document.getElementById('favoritesItems');
        if (!container) return;
        if (favorites.length === 0) {
            container.innerHTML = '<p>No favorites yet.</p>';
            return;
        }
        container.innerHTML = favorites.map((item, idx) => `
            <div class="panel-item">
                <img class="panel-item-img" src="${item.img || 'https://placehold.co/60x60/1a1a2a/gold?text=No+Img'}" onerror="this.src='https://placehold.co/60x60/1a1a2a/gold?text=No+Img'">
                <div class="panel-item-info">
                    <div class="panel-item-name">${item.name}</div>
                    <div class="panel-item-price">KES ${item.price.toLocaleString()}</div>
                </div>
                <button class="panel-item-remove" onclick="removeFavorite(${idx})">🗑️</button>
            </div>
        `).join('');
    }

    window.removeFavorite = (idx) => {
        favorites.splice(idx, 1);
        saveFavorites();
        updateFavoritesUI();
        renderProducts();
    };

    function generateWhatsAppMessage() {
        let message = "Hello Vapers City, I want to order:\n";
        cart.forEach(item => {
            message += `- ${item.name} x${item.quantity} = KES ${(item.price * item.quantity).toLocaleString()}\n`;
        });
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        message += `\nTotal: KES ${total.toLocaleString()}\nDelivery Location: Ruiru\n\nThank you!`;
        return encodeURIComponent(message);
    }

    document.getElementById('checkoutWA')?.addEventListener('click', () => {
        if (cart.length === 0) {
            alert('Your cart is empty.');
            return;
        }
        const phone = "254714693283";
        window.open(`https://wa.me/${phone}?text=${generateWhatsAppMessage()}`, '_blank');
    });

    function openCart() { document.getElementById('cartPanel').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeCart() { document.getElementById('cartPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
    function openFavorites() { document.getElementById('favoritesPanel').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeFavorites() { document.getElementById('favoritesPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

    document.getElementById('openCartBtn')?.addEventListener('click', openCart);
    document.getElementById('openFavoritesBtn')?.addEventListener('click', openFavorites);
    document.getElementById('closeCart')?.addEventListener('click', closeCart);
    document.getElementById('closeFavorites')?.addEventListener('click', closeFavorites);
    document.getElementById('overlay')?.addEventListener('click', () => { closeCart(); closeFavorites(); });

    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.getAttribute('data-category');
            switchBackground(currentCategory);
            renderProducts();
        });
    });

    document.getElementById('confirmAge')?.addEventListener('click', () => {
        localStorage.setItem('vapersAgeVerified', 'true');
        document.getElementById('ageGate').style.display = 'none';
    });
    document.getElementById('denyAge')?.addEventListener('click', () => {
        alert('Access denied. You must be 18+ to enter.');
        window.location.href = 'https://www.google.com';
    });
    if (localStorage.getItem('vapersAgeVerified') === 'true') {
        document.getElementById('ageGate').style.display = 'none';
    }

    // Initialize
    switchBackground('vape');
    renderProducts();
    updateCartUI();
    updateFavoritesUI();
</script>
</body>
</html>
