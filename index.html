<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Vibes on Vibes | Premium Vape, Velo & Shisha</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* Light Theme (Default) */
    :root {
        --bg: #f5f5f7;
        --card-bg: rgba(255,255,255,0.85);
        --text: #1a1a2e;
        --text-dim: #666;
        --border: rgba(0,0,0,0.1);
        --primary: #FF3300;
        --primary-dark: #cc2900;
        --primary-glow: rgba(255,51,0,0.3);
        --success: #25D366;
        --discount: #ff0055;
        --header-bg: rgba(255,255,255,0.95);
        --toggle-bg: rgba(0,0,0,0.05);
    }
    
    /* Dark Theme */
    body.dark {
        --bg: #0a0a0f;
        --card-bg: rgba(20,20,30,0.85);
        --text: #f0f0f0;
        --text-dim: rgba(255,255,255,0.6);
        --border: rgba(255,255,255,0.1);
        --header-bg: rgba(10,10,15,0.95);
        --toggle-bg: rgba(255,255,255,0.1);
    }
    
    body {
        font-family: 'Montserrat', sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
        transition: background 0.3s, color 0.3s;
        font-size: 16px;
        line-height: 1.5;
    }
    
    /* Live Smoke Video Background */
    .video-bg-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        overflow: hidden;
    }
    .video-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 1;
        filter: brightness(0.6) contrast(1.1);
    }
    .video-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
        z-index: -1;
    }
    
    /* Header */
    .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        background: var(--header-bg);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
    }
    .logo-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        flex: 1;
    }
    .logo {
        font-family: 'Bebas Neue', cursive;
        font-size: 2.2rem;
        letter-spacing: 4px;
        background: linear-gradient(135deg, #FF3300, #ff6600);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 30px rgba(255,51,0,0.5);
        animation: glowPulse 2s ease-in-out infinite;
    }
    @keyframes glowPulse {
        0%, 100% { text-shadow: 0 0 20px rgba(255,51,0,0.3); }
        50% { text-shadow: 0 0 40px rgba(255,51,0,0.8); }
    }
    .tagline {
        font-size: 0.65rem;
        letter-spacing: 2px;
        color: var(--text-dim);
    }
    .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    .theme-toggle {
        background: var(--toggle-bg);
        border: 1px solid var(--border);
        border-radius: 30px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: all 0.2s;
    }
    .vvip-link {
        background: linear-gradient(135deg, #FF3300, #ff6600);
        padding: 6px 16px;
        border-radius: 30px;
        color: white;
        text-decoration: none;
        font-weight: bold;
        font-size: 0.8rem;
    }
    .cart-fav-icons {
        display: flex;
        gap: 12px;
    }
    .cart-fav-icons button {
        background: none;
        border: none;
        font-size: 1.3rem;
        cursor: pointer;
        color: var(--primary);
        position: relative;
    }
    .cart-count, .fav-count {
        position: absolute;
        top: -8px;
        right: -12px;
        background: var(--primary);
        color: white;
        font-size: 0.6rem;
        border-radius: 50%;
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    /* Search Bar */
    .search-bar {
        position: fixed;
        top: 85px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 145;
        width: 90%;
        max-width: 500px;
        padding: 12px 20px;
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        border-radius: 50px;
        color: var(--text);
        font-size: 1rem;
    }
    .search-bar:focus { outline: none; border-color: var(--primary); }
    
    /* Delivery Message */
    .delivery-msg {
        position: fixed;
        top: 150px;
        left: 0;
        right: 0;
        z-index: 144;
        background: var(--success);
        color: white;
        text-align: center;
        padding: 8px;
        font-size: 0.8rem;
        font-weight: bold;
    }
    .authenticity-badge {
        position: fixed;
        top: 185px;
        left: 0;
        right: 0;
        z-index: 143;
        background: var(--primary);
        color: white;
        text-align: center;
        padding: 6px;
        font-size: 0.7rem;
        font-weight: bold;
    }
    
    /* Category Toggle */
    .category-toggle {
        position: fixed;
        top: 225px;
        left: 0;
        right: 0;
        z-index: 140;
        display: flex;
        justify-content: center;
        gap: 15px;
        padding: 10px;
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
    }
    .toggle-btn {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.1rem;
        padding: 8px 24px;
        border: 1px solid var(--border);
        background: var(--toggle-bg);
        color: var(--text);
        border-radius: 40px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .toggle-btn.active {
        background: var(--primary);
        color: white;
        border-color: transparent;
    }
    
    /* Main Container */
    .main-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 290px 20px 80px;
        position: relative;
        z-index: 2;
    }
    
    /* Section Titles */
    .section-title {
        font-family: 'Bebas Neue', cursive;
        font-size: 2rem;
        color: var(--primary);
        margin: 2rem 0 1rem;
        text-align: center;
        letter-spacing: 2px;
    }
    
    /* Sliders with Animation Effects */
    .slider-container {
        position: relative;
        margin: 1rem 0 2rem;
        overflow: hidden;
        perspective: 1000px;
    }
    .slider-track {
        display: flex;
        gap: 20px;
        overflow-x: auto;
        scroll-behavior: smooth;
        padding: 10px 5px;
        scrollbar-width: thin;
    }
    .slider-track::-webkit-scrollbar { height: 5px; }
    .slider-track::-webkit-scrollbar-track { background: var(--border); border-radius: 10px; }
    .slider-track::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    .slider-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: var(--card-bg);
        border: 1px solid var(--primary);
        color: var(--primary);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        z-index: 10;
        font-size: 1.3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
    }
    .slider-prev { left: -10px; }
    .slider-next { right: -10px; }
    
    /* Product Card - Original Layout (Image Left, Info Right) */
    .product-card {
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        border: 1px solid var(--border);
        overflow: hidden;
        transition: all 0.3s ease;
        cursor: pointer;
        display: flex;
        flex-direction: row;
        width: 100%;
        max-width: 800px;
        margin: 0 auto 20px;
    }
    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .product-img-container {
        width: 35%;
        overflow: hidden;
    }
    .product-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s;
    }
    .product-card:hover .product-img { transform: scale(1.05); }
    .product-info {
        width: 65%;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .product-name {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.6rem;
        letter-spacing: 1px;
    }
    .product-name[data-glow="red"] { text-shadow: 0 0 10px #ff3300; color: #ff3300; }
    .product-name[data-glow="blue"] { text-shadow: 0 0 10px #0088ff; color: #0088ff; }
    .product-name[data-glow="green"] { text-shadow: 0 0 10px #00ff88; color: #00ff88; }
    .product-name[data-glow="purple"] { text-shadow: 0 0 10px #cc00ff; color: #cc00ff; }
    .product-name[data-glow="gold"] { text-shadow: 0 0 10px #FFD700; color: #FFD700; }
    .product-desc { font-size: 0.85rem; color: var(--text-dim); }
    .ranking-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: bold;
        background: var(--primary);
        color: white;
        width: fit-content;
    }
    .velo-dots { display: flex; gap: 6px; margin: 5px 0; }
    .velo-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; }
    .price-section { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .old-price { font-size: 0.85rem; color: #ff6666; text-decoration: line-through; }
    .current-price { font-size: 1.3rem; font-weight: bold; color: var(--primary); }
    .discount-badge { background: var(--discount); color: white; font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; }
    .you-save { font-size: 0.7rem; color: var(--success); }
    .stock-badge { font-size: 0.7rem; color: #ff4444; }
    .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
    .btn-wishlist, .btn-cart {
        padding: 8px 16px;
        border: none;
        border-radius: 40px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .btn-wishlist { background: var(--toggle-bg); color: var(--text); border: 1px solid var(--border); }
    .btn-wishlist.active { background: #ff0055; color: white; }
    .btn-cart { background: var(--primary); color: white; }
    .btn-cart:hover { background: var(--primary-dark); transform: scale(0.98); }
    
    /* Grid Layout */
    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 20px;
        margin-top: 1rem;
    }
    .products-grid .product-card { margin: 0; width: 100%; }
    
    /* Modal with Effects */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        backdrop-filter: blur(15px);
        z-index: 10000;
        align-items: center;
        justify-content: center;
    }
    .modal-content {
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        max-width: 500px;
        width: 90%;
        max-height: 85vh;
        overflow-y: auto;
        border: 1px solid var(--border);
        position: relative;
        animation: modalPopIn 0.3s ease;
    }
    @keyframes modalPopIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }
    .modal-close {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 1.8rem;
        cursor: pointer;
        color: var(--primary);
    }
    .modal-img { width: 100%; border-radius: 20px 20px 0 0; }
    .modal-body { padding: 20px; }
    .modal-title { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; color: var(--primary); }
    .star-rating { font-size: 1.2rem; letter-spacing: 3px; margin: 10px 0; }
    .star { cursor: pointer; }
    .star.selected { color: #FFD700; text-shadow: 0 0 5px #FFD700; }
    .review-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-bottom: 8px; }
    .review-author { font-weight: bold; color: var(--primary); }
    .review-text { font-size: 0.8rem; }
    .add-review { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
    .add-review input, .add-review textarea { background: var(--toggle-bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px; color: var(--text); }
    .add-review button { background: var(--primary); border: none; padding: 8px; border-radius: 40px; color: white; cursor: pointer; }
    
    /* Sidebar */
    .side-panel {
        position: fixed;
        top: 0;
        right: -350px;
        width: 320px;
        height: 100%;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        border-left: 1px solid var(--border);
        z-index: 1000;
        padding: 20px;
        transition: right 0.3s ease;
        overflow-y: auto;
    }
    .side-panel.open { right: 0; }
    .panel-header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 10px; font-family: 'Bebas Neue', cursive; font-size: 1.3rem; }
    .panel-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text); }
    .panel-item { display: flex; gap: 10px; border-bottom: 1px solid var(--border); padding: 10px 0; }
    .panel-item-img { width: 50px; height: 50px; object-fit: cover; border-radius: 10px; }
    .panel-item-info { flex: 1; }
    .panel-item-name { font-weight: bold; }
    .panel-item-price { color: var(--primary); font-size: 0.8rem; }
    .panel-total { text-align: right; font-weight: bold; margin-top: 15px; font-size: 1.1rem; }
    .panel-wa-btn { background: var(--primary); border: none; padding: 10px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .overlay.show { opacity: 1; pointer-events: all; }
    
    /* Age Gate */
    .age-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.98);
        backdrop-filter: blur(20px);
        z-index: 10001;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .age-card { background: var(--card-bg); border-radius: 20px; padding: 30px; max-width: 300px; text-align: center; border: 2px solid var(--primary); }
    .age-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
    .btn-yes { background: var(--primary); padding: 10px 20px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; color: white; }
    .btn-no { background: #444; padding: 10px 20px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; color: white; }
    
    .floating-buttons {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .float-btn { width: 50px; height: 50px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; border: none; background: var(--primary); color: white; }
    
    @media (max-width: 768px) {
        .product-card { flex-direction: column; max-width: 100%; }
        .product-img-container { width: 100%; height: 200px; }
        .product-info { width: 100%; padding: 15px; }
        .product-name { font-size: 1.3rem; }
        .section-title { font-size: 1.5rem; }
        .products-grid { grid-template-columns: 1fr; }
        .main-container { padding-top: 330px; }
        .category-toggle { top: 260px; }
        .toggle-btn { font-size: 0.9rem; padding: 5px 15px; }
    }
</style>
</head>

          fullDesc: "Neon aesthetics with Strawberry Watermelon flavor. 600mAh battery, 14ml e-liquid, dual mesh coil.",
          specs: "600mAh | 14ml | 5% Nicotine | USB-C" },
        { name: "HQD Cuvie Plus", desc: "Mango Ice, 1,200 puffs. Compact reliable.", price: 1300, oldPrice: 1800, discount: 28, ranking: "SILVER", img: "", rating: 4.0, stock: 56, glow: "gold", reviews: [],
          fullDesc: "Classic mango ice flavor. Perfect for beginners or as a backup device.",
          specs: "400mAh | 3.5ml | 5% Nicotine" }
    ];

    const veloProducts = [
        { name: "Velo 3 Dots Mint", desc: "Mild strength, fresh mint. 20 pouches.", price: 1200, oldPrice: 1600, discount: 25, dots: 3, ranking: "SILVER", img: "", rating: 4.0, stock: 67, glow: "green", reviews: [],
          fullDesc: "Mild nicotine strength, fresh mint flavor. 20 all-white pouches, tobacco-free, 30-min release.",
          specs: "20 Pouches | 3 Dots (Mild) | Mint Flavor" },
        { name: "Velo 4 Dots Mint", desc: "Medium strength, cool mint.", price: 1300, oldPrice: 1700, discount: 24, dots: 4, ranking: "SILVER", img: "", rating: 4.1, stock: 52, glow: "green", reviews: [],
          fullDesc: "Medium strength cool mint. 20 pouches, tobacco-free, longer-lasting cool sensation.",
          specs: "20 Pouches | 4 Dots (Medium) | Cool Mint" },
        { name: "Velo 5 Dots Mint", desc: "Strong strength, extreme freeze.", price: 1400, oldPrice: 1900, discount: 26, dots: 5, ranking: "GOLD", img: "", rating: 4.3, stock: 34, glow: "purple", reviews: [],
          fullDesc: "Strong nicotine strength, extreme freeze. For experienced users.",
          specs: "20 Pouches | 5 Dots (Strong) | Extreme Freeze" },
        { name: "Velo 6 Dots Mint", desc: "Extra strong, max freeze.", price: 1500, oldPrice: 2100, discount: 29, dots: 6, ranking: "GOLD", img: "", rating: 4.4, stock: 28, glow: "purple", reviews: [],
          fullDesc: "Maximum nicotine strength, arctic freeze intensity.",
          specs: "20 Pouches | 6 Dots (Extra Strong) | Max Freeze" }
    ];

    const shishaProducts = [
        { name: "Tangiers Cane Mint", desc: "Legendary dark-leaf, intense peppermint.", price: 3500, oldPrice: 4500, discount: 22, ranking: "DIAMOND", img: "", rating: 4.9, stock: 15, glow: "green", reviews: [],
          fullDesc: "Burley tobacco base, pure peppermint. High nicotine, heat-sensitive, cult classic.",
          specs: "250g | Dark Leaf | High Nicotine" },
        { name: "Adalya Love 66", desc: "Passionfruit, watermelon, mint. Global sensation.", price: 2800, oldPrice: 3600, discount: 22, ranking: "PLATINUM", img: "", rating: 4.7, stock: 27, glow: "red", reviews: [],
          fullDesc: "Tropical blend of passionfruit, watermelon, and mint. Massive clouds, heat-resistant.",
          specs: "250g | Blonde Leaf | Medium Nicotine" },
        { name: "Al Fakher Grape Mint", desc: "Sweet grape + refreshing mint.", price: 2200, oldPrice: 2800, discount: 21, ranking: "GOLD", img: "", rating: 4.5, stock: 43, glow: "purple", reviews: [],
          fullDesc: "Classic grape mint blend. Smooth smoke, crowd favorite.",
          specs: "250g | Blonde Leaf | Medium Nicotine" }
    ];

    const weeklyOffers = [...vapeProducts.slice(0, 2), ...veloProducts.slice(0, 2), ...shishaProducts.slice(0, 1)];
    const bestSellers = [...vapeProducts.slice(0, 1), ...shishaProducts.slice(0, 2)];

    let cart = JSON.parse(localStorage.getItem('vibes_cart') || '[]');
    let favorites = JSON.parse(localStorage.getItem('vibes_favorites') || '[]');
    let currentCategory = 'vape';
    let currentModalProduct = null;
    let searchQuery = '';

    function saveCart() { localStorage.setItem('vibes_cart', JSON.stringify(cart)); updateCartCount(); }
    function saveFavorites() { localStorage.setItem('vibes_favorites', JSON.stringify(favorites)); updateFavCount(); }
    function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((s,i)=> s + i.quantity, 0); }
    function updateFavCount() { document.getElementById('favCount').innerText = favorites.length; }

    function getGlowColor(product) {
        if (product.name.toLowerCase().includes('blue')) return 'blue';
        if (product.name.toLowerCase().includes('red')) return 'red';
        if (product.name.toLowerCase().includes('green')) return 'green';
        if (product.name.toLowerCase().includes('purple')) return 'purple';
        return product.glow || 'gold';
    }

    function renderVeloDots(dots) {
        let html = '<div class="velo-dots">';
        for (let i = 0; i < dots; i++) html += '<div class="velo-dot"></div>';
        html += '</div>';
        return html;
    }

    function renderProductCard(p, isHorizontal = false) {
        const placeholderImg = 'https://placehold.co/400x400/1a1a2a/FF3300?text=' + encodeURIComponent(p.name.substring(0, 15));
        const dotsHtml = p.dots ? renderVeloDots(p.dots) : '';
        const glowColor = getGlowColor(p);
        return `
            <div class="product-card">
                <div class="product-img-container">
                    <img class="product-img" src="${p.img || placeholderImg}" alt="${p.name}" onclick="openModal('${p.name.replace(/'/g, "\\'")}')">
                </div>
                <div class="product-info">
                    <span class="ranking-badge">🏆 ${p.ranking}</span>
                    <div class="product-name" data-glow="${glowColor}">${p.name}</div>
                    ${dotsHtml}
                    <div class="product-desc">${p.desc}</div>
                    <div class="price-section">
                        <span class="old-price">KES ${p.oldPrice.toLocaleString()}</span>
                        <span class="current-price">KES ${p.price.toLocaleString()}</span>
                        <span class="discount-badge">-${p.discount}%</span>
                    </div>
                    <div class="you-save">💵 You save KES ${(p.oldPrice - p.price).toLocaleString()}</div>
                    ${p.stock < 10 ? `<div class="stock-badge">🔥 Only ${p.stock} left!</div>` : ''}
                    <div class="action-buttons">
                        <button class="btn-wishlist ${isFavorite(p.name) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.desc.replace(/'/g, "\\'")}', '', ${p.dots || 0})">
                            <i class="fas fa-heart"></i> ${isFavorite(p.name) ? 'Saved' : 'Save'}
                        </button>
                        <button class="btn-cart" onclick="event.stopPropagation(); addToCart('${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.desc.replace(/'/g, "\\'")}', '', ${p.dots || 0})">
                            <i class="fas fa-shopping-cart"></i> Grab
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    function createHorizontalSlider(title, items, sliderId) {
        if (!items || items.length === 0) return '';
        return `
            <div class="section-title">${title}</div>
            <div class="slider-container">
                <div class="slider-nav slider-prev" onclick="slideHorizontal('${sliderId}', -1)">‹</div>
                <div class="slider-nav slider-next" onclick="slideHorizontal('${sliderId}', 1)">›</div>
                <div class="slider-track" id="${sliderId}">
                    ${items.map(item => renderProductCard(item, true)).join('')}
                    ${items.map(item => renderProductCard(item, true)).join('')}
                </div>
            </div>
        `;
    }

    window.slideHorizontal = (sliderId, direction) => {
        const slider = document.getElementById(sliderId);
        if (slider) {
            slider.scrollLeft += direction * 400;
            if (slider.scrollLeft <= 0 && direction === -1) slider.scrollLeft = slider.scrollWidth / 2;
            if (slider.scrollLeft + slider.clientWidth >= slider.scrollWidth && direction === 1) slider.scrollLeft = slider.scrollWidth / 2 - slider.clientWidth;
        }
    };

    function getFilteredProducts() {
        let products = currentCategory === 'vape' ? vapeProducts : (currentCategory === 'velo' ? veloProducts : shishaProducts);
        if (searchQuery) {
            products = products.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.desc.toLowerCase().includes(searchQuery.toLowerCase()));
        }
        return products;
    }

    function renderProducts() {
        const container = document.getElementById('productsContainer');
        const filtered = getFilteredProducts();
        let html = '';
        html += createHorizontalSlider('🔥 DROP OF THE WEEK', weeklyOffers, 'offersSlider');
        html += createHorizontalSlider('👑 COMMUNITY VIBES', bestSellers, 'bestsellerSlider');
        html += `<div class="section-title">✨ ALL ${currentCategory.toUpperCase()} VIBES ${searchQuery ? `(Search: "${searchQuery}")` : ''}</div>`;
        if (filtered.length === 0) {
            html += `<div style="text-align:center; padding:40px;">🔍 No vibes found for "${searchQuery}". Try something else!</div>`;
        } else {
            html += `<div class="products-grid">${filtered.map(p => renderProductCard(p)).join('')}</div>`;
        }
        container.innerHTML = html;
    }

    // Load saved reviews and ratings
    function loadProductData() {
        const savedRatings = JSON.parse(localStorage.getItem('vibes_ratings') || '{}');
        const savedReviews = JSON.parse(localStorage.getItem('vibes_reviews') || '{}');
        [...vapeProducts, ...veloProducts, ...shishaProducts].forEach(p => {
            if (savedRatings[p.name]) p.rating = savedRatings[p.name];
            if (savedReviews[p.name]) p.reviews = savedReviews[p.name];
        });
    }
    function saveProductData() {
        const ratings = {}, reviews = {};
        [...vapeProducts, ...veloProducts, ...shishaProducts].forEach(p => {
            ratings[p.name] = p.rating;
            reviews[p.name] = p.reviews;
        });
        localStorage.setItem('vibes_ratings', JSON.stringify(ratings));
        localStorage.setItem('vibes_reviews', JSON.stringify(reviews));
    }
    loadProductData();

    function openModal(productName) {
        let product = null;
        [...vapeProducts, ...veloProducts, ...shishaProducts].forEach(p => { if (p.name === productName) product = p; });
        if (!product) return;
        currentModalProduct = product;
        document.getElementById('modalTitle').innerText = product.name;
        document.getElementById('modalImg').src = product.img || 'https://placehold.co/400x400/1a1a2a/FF3300?text=' + encodeURIComponent(product.name.substring(0, 15));
        document.getElementById('modalDesc').innerHTML = product.fullDesc || product.desc;
        document.getElementById('modalSpecs').innerHTML = `<strong>📋 Specs:</strong><br>${product.specs || 'Contact us for details'}`;
        document.getElementById('modalPrice').innerHTML = `<span class="old-price">KES ${product.oldPrice.toLocaleString()}</span> <span class="current-price">KES ${product.price.toLocaleString()}</span> <span class="discount-badge">-${product.discount}%</span>`;
        
        let starsHtml = '';
        for (let i = 1; i <= 5; i++) {
            starsHtml += `<span class="star ${i <= product.rating ? 'selected' : ''}" onclick="setRating('${product.name}', ${i})">★</span>`;
        }
        document.getElementById('starRating').innerHTML = starsHtml;
        
        const reviewsContainer = document.getElementById('modalReviews');
        if (product.reviews && product.reviews.length > 0) {
            reviewsContainer.innerHTML = `<div style="margin:10px 0;"><strong>⭐ Customer Reviews:</strong></div>` + 
                product.reviews.map(r => `<div class="review-item"><div class="review-author">${r.name}</div><div class="review-text">${r.text}</div></div>`).join('');
        } else {
            reviewsContainer.innerHTML = '<div style="margin:10px 0; opacity:0.6;">✨ No reviews yet. Be the first to rate!</div>';
        }
        
        document.getElementById('productModal').style.display = 'flex';
    }

    window.setRating = (productName, rating) => {
        let product = [...vapeProducts, ...veloProducts, ...shishaProducts].find(p => p.name === productName);
        if (product) {
            product.rating = rating;
            saveProductData();
            openModal(productName);
            renderProducts();
        }
    };

    document.getElementById('modalClose').onclick = () => document.getElementById('productModal').style.display = 'none';
    document.getElementById('submitReview').onclick = () => {
        const name = document.getElementById('reviewName').value.trim();
        const text = document.getElementById('reviewText').value.trim();
        if (!name || !text) { alert('Please enter your name and review.'); return; }
        if (currentModalProduct) {
            if (!currentModalProduct.reviews) currentModalProduct.reviews = [];
            currentModalProduct.reviews.push({ name, text });
            saveProductData();
            document.getElementById('reviewName').value = '';
            document.getElementById('reviewText').value = '';
            openModal(currentModalProduct.name);
        }
    };
    document.getElementById('modalAddToCart').onclick = () => {
        if (currentModalProduct) addToCart(currentModalProduct.name, currentModalProduct.price, currentModalProduct.desc, '', currentModalProduct.dots || 0);
    };

    function addToCart(name, price, desc, img, dots) {
        const existing = cart.find(item => item.name === name);
        if (existing) existing.quantity++;
        else cart.push({ name, price, desc, img, dots, quantity: 1 });
        saveCart();
        updateCartUI();
        alert(`🎉 ${name} added to cart!`);
    }

    function toggleFavorite(name, price, desc, img, dots) {
        const existing = favorites.find(f => f.name === name);
        if (existing) favorites = favorites.filter(f => f.name !== name);
        else favorites.push({ name, price, desc, img, dots });
        saveFavorites();
        updateFavoritesUI();
        renderProducts();
    }

    function isFavorite(name) { return favorites.some(f => f.name === name); }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        if (!cart.length) {
            container.innerHTML = '<p>Your cart is empty.</p>';
            document.getElementById('cartTotal').innerHTML = 'Total: KES 0';
            return;
        }
        let total = 0;
        container.innerHTML = cart.map((item, idx) => {
            total += item.price * item.quantity;
            return `
                <div class="panel-item">
                    <div class="panel-item-info">
                        <div class="panel-item-name">${item.name}</div>
                        <div class="panel-item-price">KES ${item.price.toLocaleString()}</div>
                        <div style="display: flex; gap: 8px; margin-top: 5px;">
                            <button onclick="updateQuantity(${idx}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity(${idx}, 1)">+</button>
                        </div>
                    </div>
                    <button class="panel-item-remove" onclick="removeFromCart(${idx})">🗑️</button>
                </div>
            `;
        }).join('');
        document.getElementById('cartTotal').innerHTML = `Total: KES ${total.toLocaleString()}`;
        updateCartCount();
    }

    window.updateQuantity = (idx, delta) => {
        const item = cart[idx];
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart.splice(idx, 1);
            saveCart();
            updateCartUI();
        }
    };
    window.removeFromCart = (idx) => {
        cart.splice(idx, 1);
        saveCart();
        updateCartUI();
    };

    function updateFavoritesUI() {
        const container = document.getElementById('favoritesItems');
        if (!favorites.length) {
            container.innerHTML = '<p>No saved vibes yet.</p>';
            return;
        }
        container.innerHTML = favorites.map((item, idx) => `
            <div class="panel-item">
                <div class="panel-item-info">
                    <div class="panel-item-name">${item.name}</div>
                    <div class="panel-item-price">KES ${item.price.toLocaleString()}</div>
                </div>
                <button class="panel-item-remove" onclick="removeFavorite(${idx})">🗑️</button>
            </div>
        `).join('');
        updateFavCount();
    }
    window.removeFavorite = (idx) => {
        favorites.splice(idx, 1);
        saveFavorites();
        updateFavoritesUI();
        renderProducts();
    };

    function generateWhatsAppMessage() {
        let msg = "Hello Vibes on Vibes, I want to order:\n";
        cart.forEach(item => msg += `- ${item.name} x${item.quantity} = KES ${(item.price * item.quantity).toLocaleString()}\n`);
        msg += `\nTotal: KES ${cart.reduce((s,i)=> s + (i.price * i.quantity),0).toLocaleString()}\nDelivery: Ruiru\nThank you!`;
        return encodeURIComponent(msg);
    }

    document.getElementById('checkoutWA').onclick = () => {
        if (!cart.length) { alert('Your cart is empty.'); return; }
        window.open(`https://wa.me/254714693283?text=${generateWhatsAppMessage()}`, '_blank');
    };

    function updateDeliveryMessage() {
        const now = new Date();
        const day = now.getDay();
        const hour = now.getHours();
        const isWeekend = day === 0 || day === 6;
        const msgDiv = document.getElementById('deliveryMsg');
        if (isWeekend) msgDiv.innerHTML = "🚚 24/7 DELIVERY ON WEEKENDS! Order anytime → arrives today 🚚";
        else if (hour < 22) msgDiv.innerHTML = "🚚 ORDER BY 10PM → ARRIVES TOMORROW! Same-day delivery in Ruiru 🚚";
        else msgDiv.innerHTML = "🚚 ORDER NOW → ARRIVES DAY AFTER TOMORROW! We'll keep you updated 🚚";
    }
    updateDeliveryMessage();

    document.getElementById('themeToggle').onclick = () => {
        document.body.classList.toggle('dark');
        document.getElementById('themeToggle').innerText = document.body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
    };

    function openCart() { document.getElementById('cartPanel').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeCart() { document.getElementById('cartPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
    function openFav() { document.getElementById('favoritesPanel').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
    function closeFav() { document.getElementById('favoritesPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

    document.getElementById('openCartBtn').onclick = openCart;
    document.getElementById('openFavoritesBtn').onclick = openFav;
    document.getElementById('floatCart').onclick = openCart;
    document.getElementById('floatFav').onclick = openFav;
    document.getElementById('closeCart').onclick = closeCart;
    document.getElementById('closeFavorites').onclick = closeFav;
    document.getElementById('overlay').onclick = () => { closeCart(); closeFav(); };

    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderProducts();
    });

    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.getAttribute('data-category');
            renderProducts();
        });
    });

    document.getElementById('confirmAge').onclick = () => {
        localStorage.setItem('vibes_age_verified', 'true');
        document.getElementById('ageGate').style.display = 'none';
    };
    document.getElementById('denyAge').onclick = () => {
        alert('Access denied. You must be 18+ to enter.');
        window.location.href = 'https://www.google.com';
    };
    if (localStorage.getItem('vibes_age_verified') === 'true') document.getElementById('ageGate').style.display = 'none';

    renderProducts();
    updateCartUI();
    updateFavoritesUI();
    updateCartCount();
    updateFavCount();
</script>
</body>
</html>
