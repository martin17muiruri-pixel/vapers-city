backend:
  name: github
  repo: martin17muiruri-pixel/vapers-city
  branch: main
  base_url: https://vapers-city-oauth.martin17muiruri.workers.dev
  auth_endpoint: auth  # THIS LINE IS CRITICAL

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "data/products"
    create: true
    fields:
      - { name: "name", label: "Name", widget: "string" }
      - { name: "price", label: "Price", widget: "string" }
      - { name: "flavor", label: "Flavor", widget: "string" }
