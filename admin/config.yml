backend:
  name: github
  repo: martin17muiruri-pixel/vapers-city
  branch: main

media_folder: "images"
public_folder: "/images"

media_library:
  name: uploadcare
  config:
    publicKey: ""

collections:
  - name: "products"
    label: "Products"
    folder: "data/products"
    create: true
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Flavor", name: "flavor", widget: "string" }
      - { label: "Puff Count", name: "puffs", widget: "string" }
      - { label: "Tagline", name: "tagline", widget: "string" }
      - { label: "Refillable", name: "refillable", widget: "boolean", default: false }
